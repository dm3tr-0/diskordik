<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discord Clone{% endblock %}</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="{{ url_for('static', filename='socket.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Глобальная плашка для активного звонка -->
    <div id="globalCallWidget" style="display: none;">
        <div id="callWidgetContent">
            <span id="callWidgetStatus">Звонок...</span>
            <span id="callWidgetUsername"></span>
            <div class="call-widget-controls">
                <button id="muteBtn" title="Отключить микрофон">🎤</button>
                <button id="speakerBtn" title="Отключить звук">🔊</button>
                <button id="endCallBtn" class="end-call-widget" title="Завершить звонок">📴</button>
            </div>
        </div>
    </div>

    <!-- Глобальное модальное окно для входящего звонка -->
    <div id="globalCallModal" class="call-modal" style="display: none;">
        <div class="call-window">
            <h3 id="modalCallerName">Входящий звонок...</h3>
            <div id="modalCallAvatar" class="call-avatar">🎤</div>
            <div id="modalVideoContainer" class="video-container" style="display: none;">
                <video id="modalLocalVideo" class="local-video" autoplay muted playsinline></video>
            </div>
            <div id="modalCallStatus" class="call-status">Звонок...</div>
            <div class="call-buttons" id="modalCallButtons">
                <button class="accept-call" onclick="acceptCallFromModal()">Принять</button>
                <button class="reject-call" onclick="rejectCallFromModal()">Отклонить</button>
            </div>
        </div>
    </div>

    <div class="{% if request.endpoint in ['login', 'register'] %}auth-page{% else %}container{% endif %}">
        {% block content %}{% endblock %}
    </div>

    <script src="{{ url_for('static', filename='call.js') }}"></script>
</body>
</html>
